<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Manager v3.2 (Cosmos)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --cream:#F6F2EA; --cream-dark:#EDE8DE; --cream-mid:#E8E2D6;
  --ink:#1A1815; --ink-soft:#4A453F; --ink-muted:#7A7369;
  --forest:#1F3A2E; --forest-bg:#162B22; --forest-mid:#2A4E3B;
  --terra:#B5543A; --terra-pale:#F5EAE6; --terra-mid:#DDB0A0;
  --gold:#9C7A2C; --gold-pale:#F2EBD8; --gold-mid:#D4C090;
  --line:#DDD5C4;
  --green-soft:#1A5C3A; --green-pale:#E4F0E8; --green-mid:#A8CFB8;
  --red-soft:#8B2A1C; --red-pale:#F5E6E3;
  --F:'IBM Plex Sans',sans-serif; --FM:'IBM Plex Mono',monospace; --FT:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--F);background:var(--cream);min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased}
#wrap{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sb{width:230px;background:var(--forest-bg);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid rgba(255,255,255,.05)}
.sb-hd{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{font-family:var(--FT);font-size:15px;font-weight:600;color:var(--cream);letter-spacing:-.2px}
.sb-sub{font-size:10px;color:rgba(246,242,234,.3);margin-top:3px;letter-spacing:.4px;text-transform:uppercase}
.sb-user{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.15)}
.sb-user-name{font-size:12px;color:var(--cream);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-mail{font-size:10px;color:rgba(246,242,234,.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-logout{margin-top:10px;display:block;width:100%;padding:7px 10px;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(246,242,234,.7);font-size:11px;border-radius:4px;cursor:pointer;text-align:center;text-decoration:none;font-family:var(--F);transition:all .15s}
.sb-logout:hover{background:rgba(255,255,255,.08);color:var(--cream);border-color:rgba(255,255,255,.3)}
.sb-lbl{padding:14px 18px 4px;font-size:9px;color:rgba(246,242,234,.22);text-transform:uppercase;letter-spacing:1.1px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;margin:1px 10px;padding:8px 10px;border-radius:4px;color:rgba(246,242,234,.48);cursor:pointer;transition:color .12s,background .12s;font-size:13px;user-select:none;border-left:2px solid transparent;border-radius:0;margin:0}
.ni:hover{background:rgba(246,242,234,.05);color:var(--cream)}
.ni.on{background:rgba(181,84,58,.14);color:var(--cream);border-left-color:var(--terra)}
.ni-ic{font-size:14px;width:18px;text-align:center;opacity:.8}
.ni.on .ni-ic{opacity:1}
.sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07)}
.sf-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sf-lbl{color:rgba(246,242,234,.35)}.sf-val{color:rgba(246,242,234,.55);font-weight:500;font-family:var(--FM)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ph{background:var(--cream);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap}
.ph-t{font-family:var(--FT);font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-.3px}
.ph-s{font-size:11px;color:var(--ink-muted);margin-top:2px}
.ph-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#sync-indicator.stale{color:#c2410c;font-weight:600}
#btn-refresh.syncing{opacity:.6;pointer-events:none}
#btn-refresh.syncing::before{content:'⟳ ';display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pb{flex:1;overflow-y:auto;padding:20px 22px;background:var(--cream)}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:14px;bottom:14px;left:0;width:2px;border-radius:0 1px 1px 0}
.kpi.k1::after{background:var(--forest)}.kpi.k2::after{background:var(--gold)}
.kpi.k3::after{background:var(--terra)}.kpi.k4::after{background:var(--ink-soft)}
.kl{font-size:10px;color:var(--ink-muted);font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kv{font-family:var(--FM);font-size:24px;font-weight:500;color:var(--ink);line-height:1.1;letter-spacing:-1px}
.kv.sm{font-family:var(--FM);font-size:15px;font-weight:500;letter-spacing:-.3px}
.kf{font-size:11px;color:var(--ink-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}

/* CARDS */
.card{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:16px 20px;margin-bottom:16px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-family:var(--FT);font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.tw{overflow-x:auto}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--ink-muted);font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;background:var(--cream-dark);border-bottom:1px solid var(--line);white-space:nowrap;font-family:var(--F)}
td{padding:10px 12px;border-bottom:1px solid var(--line);color:var(--ink-soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream-dark)}
.tfoot td{background:var(--cream-dark);font-weight:600;font-size:12px;border-top:1px solid var(--line);border-bottom:none;color:var(--ink)}
.mini-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.mini-table th{padding:6px 8px;background:var(--cream-dark);color:var(--ink-muted);font-weight:600;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.mini-table td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--ink-soft)}
.mini-table tr:last-child td{border-bottom:none}

/* BADGES — pastille colorée */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 6px;border-radius:3px;font-size:10.5px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bs{background:var(--green-pale);color:var(--green-soft);border-color:var(--green-mid)}.bs::before{background:var(--green-soft)}
.bw{background:var(--gold-pale);color:var(--gold);border-color:var(--gold-mid)}.bw::before{background:var(--gold)}
.bd{background:var(--red-pale);color:var(--red-soft);border-color:#DBBAB5}.bd::before{background:var(--red-soft)}
.bi{background:#E6EEE9;color:var(--forest);border-color:#B8CFC0}.bi::before{background:var(--forest)}
.bn{background:var(--cream-dark);color:var(--ink-muted);border-color:var(--line)}.bn::before{background:#B0A898}
.bp{background:var(--terra-pale);color:var(--terra);border-color:var(--terra-mid)}.bp::before{background:var(--terra)}

/* PROGRESS */
.prw{display:flex;align-items:center;gap:7px}
.prg{height:4px;background:var(--line);border-radius:2px;width:60px;overflow:hidden}
.prf{height:100%;border-radius:2px;background:var(--forest)}
.prw span{font-size:11px;color:var(--ink-muted);min-width:28px;font-family:var(--FM)}
.prog-bar-big{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-bar-fill{height:100%;border-radius:3px;background:var(--forest)}

/* TOOLBAR */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.tb-l{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit}
.si{padding:6px 11px;border:1px solid var(--line);border-radius:4px;font-size:13px;background:var(--cream);color:var(--ink);width:200px}
.si:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(31,58,46,.1)}
.fl{padding:6px 11px;border:1px solid var(--line);border-radius:4px;font-size:13px;background:var(--cream);color:var(--ink);cursor:pointer}
.fl:focus{outline:none;border-color:var(--forest)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--cream);color:var(--ink-soft);transition:all .12s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--cream-dark);border-color:#C8BFB0}
.btn-prim{background:var(--forest);color:var(--cream);border-color:var(--forest)}
.btn-prim:hover{background:var(--forest-mid)}
.btn-sm{padding:4px 10px;font-size:12px}
.act{padding:3px 8px;font-size:11px;border:1px solid var(--line);border-radius:3px;background:var(--cream);color:var(--ink-muted);cursor:pointer;font-family:inherit;transition:all .1s}
.act:hover{background:var(--cream-dark);color:var(--ink)}
.act.red{color:var(--terra)}.act.red:hover{background:var(--terra-pale);border-color:var(--terra-mid)}

/* MODAL */
#mod{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,24,21,.55);z-index:1000;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
#mod.show{display:flex}
.mbox{background:var(--cream);border:1px solid var(--line);border-radius:5px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(26,24,21,.2)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line)}
.mt{font-family:var(--FT);font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.mcl{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink-muted);padding:2px 6px;border-radius:3px;line-height:1}
.mcl:hover{background:var(--cream-dark)}
.mb2{padding:20px;max-height:72vh;overflow-y:auto}
.mf{display:flex;justify-content:flex-end;gap:10px;padding:13px 20px;border-top:1px solid var(--line)}

/* FORM */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fc{width:100%;padding:7px 11px;border:1px solid var(--line);border-radius:4px;font-size:13px;background:var(--cream);color:var(--ink);font-family:inherit}
.fc:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(31,58,46,.1)}
.fc[readonly]{background:var(--cream-dark);color:var(--ink-muted)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* SECTIONS DANS MODAL */
.sec{border-top:1px solid var(--line);margin-top:16px;padding-top:14px}
.sec-t{font-family:var(--FT);font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px;letter-spacing:-.1px}

/* INFO BOXES */
.ai-box{border-left:3px solid var(--gold);background:var(--gold-pale);border-radius:3px;padding:10px 14px;margin-bottom:8px}
.ai-t{font-size:12px;font-weight:600;color:var(--gold)}
.ai-s{font-size:11px;color:#6B5A1E;margin-top:2px}
.ai-r{background:var(--red-pale);border-left-color:var(--terra)}
.ai-r .ai-t{color:var(--terra)}.ai-r .ai-s{color:#7A3020}
.info-box{border-radius:3px;padding:10px 14px;font-size:12px;margin-bottom:10px}
.info-amber{background:var(--gold-pale);border-left:3px solid var(--gold);color:#5E4A10}
.info-blue{background:#E6EEE9;border-left:3px solid var(--forest);color:var(--forest)}
.info-green{background:var(--green-pale);border-left:3px solid var(--green-soft);color:var(--green-soft)}

/* MODE BTN */
.mode-btn-grp{display:flex;gap:0;border:1px solid var(--line);border-radius:4px;overflow:hidden}
.mode-btn{flex:1;padding:7px 4px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--cream);color:var(--ink-muted);transition:all .15s;font-family:inherit;text-align:center}
.mode-btn.on{background:var(--forest);color:var(--cream)}
.mode-btn:not(:last-child){border-right:1px solid var(--line)}

/* OS ROWS */
.os-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;border-radius:4px;padding:10px}
.os-arret{background:var(--terra-pale);border-left:3px solid var(--terra)}
.os-reprise{background:var(--green-pale);border-left:3px solid var(--green-soft)}

/* DROPDOWN */
.drop{position:relative;display:inline-block}
.drop-menu{display:none;position:absolute;right:0;top:110%;background:var(--cream);border:1px solid var(--line);border-radius:4px;box-shadow:0 8px 24px rgba(26,24,21,.12);z-index:100;min-width:200px;overflow:hidden}
.drop-menu.show{display:block}
.drop-item{display:block;width:100%;padding:9px 14px;font-size:13px;color:var(--ink-soft);background:none;border:none;text-align:left;cursor:pointer;font-family:inherit}
.drop-item:hover{background:var(--cream-dark)}
.drop-sep{height:1px;background:var(--line);margin:2px 0}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--cream);padding:9px 18px;border-radius:4px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(26,24,21,.3);opacity:0;transition:opacity .3s;pointer-events:none;font-family:var(--F)}
.toast.show{opacity:1}

/* MISC */
.empty{text-align:center;padding:40px;color:var(--ink-muted)}

/* ── RESPONSIVE MOBILE (iPhone / tablette) ─────────────────── */
.ham{display:none;background:none;border:none;font-size:22px;color:var(--ink);cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0}
#sb-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,24,21,.45);z-index:99}

@media screen and (max-width:768px){
  #wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  
  #sb.open{-webkit-transform:translateX(0);transform:translateX(0)}
  #sb.open ~ #sb-ov,.show{display:block}
  
  
  .ham{display:-webkit-flex!important;display:flex!important;
       -webkit-align-items:center;align-items:center;
       -webkit-justify-content:center;justify-content:center}
  .ph{padding:10px 14px;gap:8px}
  .ph-t{font-size:15px}
  .ph-r .drop{display:none}
  .krow{grid-template-columns:1fr 1fr!important;gap:8px;margin-bottom:14px}
  .g2{grid-template-columns:1fr!important}
  .card{padding:12px 14px}
  .tb{-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:flex-start;align-items:flex-start}
  .tb-l,.si,.fl{width:100%}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:12px;min-width:480px}
  th,td{padding:7px 8px;white-space:nowrap}
  #mod{padding:0;-webkit-align-items:flex-end;align-items:flex-end}
  .mbox{max-width:100%!important;border-radius:10px 10px 0 0;max-height:92vh}
  .mb2{max-height:62vh}
  .os-row{grid-template-columns:auto 1fr;grid-template-rows:auto auto}
  .fr2{grid-template-columns:1fr!important}
  .toast{bottom:10px;right:10px;left:10px;text-align:center}
  .mode-btn{font-size:11px;padding:8px 3px}
}
@media screen and (max-width:400px){
  .krow{grid-template-columns:1fr!important}
  .kv{font-size:20px}
  .ph-t{font-size:14px}
}
</style>
</head>
<body>
<div id="wrap">
<div id="sb-ov" onclick="toggleSb()"></div>
  <nav id="sb">
    <div class="sb-hd"><div class="sb-brand">MP Manager</div><div class="sb-sub">v3.2 &middot; Cosmos &middot; Multi-utilisateurs</div></div>
    <div class="sb-lbl">Navigation</div>
    <div class="ni on" data-page="dashboard"><span class="ni-ic">&#128202;</span>Tableau de bord</div>
    <div class="ni" data-page="ao"><span class="ni-ic">&#128221;</span>Appels d'offres</div>
    <div class="ni" data-page="marches"><span class="ni-ic">&#128203;</span>Marchés</div>
    <div class="ni" data-page="cautions"><span class="ni-ic">&#127970;</span>Cautions bancaires</div>
    <div class="ni" data-page="paiements"><span class="ni-ic">&#128176;</span>Paiements</div>
    <div class="ni" data-page="rapports"><span class="ni-ic">&#128202;</span>Rapports</div>
    <div class="sb-foot" id="sbf"></div>
    <div class="sb-user" id="sbu" style="display:none">
      <div class="sb-user-name" id="sbu-name">-</div>
      <div class="sb-user-mail" id="sbu-mail">-</div>
      <a href="/logout" class="sb-logout">Se deconnecter</a>
    </div>
  </nav>
  <div id="main">
    <div class="ph">
      <button class="ham" id="ham" onclick="toggleSb()">&#9776;</button>
      <div><div class="ph-t" id="ph-t">Tableau de bord</div><div class="ph-s" id="ph-s"></div></div>
      <div class="ph-r">
        <span id="sync-indicator" style="font-size:11px;color:#7A7369;font-family:var(--FM);white-space:nowrap" title="Derniere synchronisation avec le cloud">Chargement...</span>
        <button class="btn" id="btn-refresh" onclick="manualRefresh()" title="Rafraichir les donnees depuis le cloud">&#8635; Rafraichir</button>
        <div class="drop">
          <button class="btn" onclick="toggleDrop(this)">Exporter &#9660;</button>
          <div class="drop-menu">
            <button class="drop-item" onclick="exportCSV('ao')">AO (CSV)</button>
            <button class="drop-item" onclick="exportCSV('marches')">Marches (CSV)</button>
            <button class="drop-item" onclick="exportCSV('cautions')">Cautions (CSV)</button>
            <button class="drop-item" onclick="exportCSV('paiements')">Paiements (CSV)</button>
            <div class="drop-sep"></div>
            <button class="drop-item" onclick="exportJSON()">Sauvegarde complete (JSON)</button>
          </div>
        </div>
        <button class="btn" onclick="importJSON()">Restaurer</button>
        <button class="btn btn-prim" id="btn-new" style="display:none" onclick="S._nfn&&S._nfn()">+ Nouveau</button>
      </div>
    </div>
    <div class="pb" id="pb"></div>
  </div>
</div>
<div id="mod" onclick="modOut(event)"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="fi" accept=".json" style="display:none" onchange="handleImport(event)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var BANQUES=['Attijariwafa Bank','CIH Bank','BMCE Bank','Banque Populaire','SGMB','BMCI','CFG Bank','Al Barid Bank'];
var TC={bonne_execution:'Caution definitive',retenue_garantie:'Caution de RG',soumission:'Caution de soumission',avance_demarrage:"Caution avance demarrage"};
var SMM={en_cours:{l:'En cours',c:'bi'},termine:{l:'Termine',c:'bs'},suspendu:{l:'Suspendu',c:'bw'},resilie:{l:'Resilie',c:'bd'}};
var SMC={active:{l:'Active',c:'bs'},mainlevee_demandee:{l:'Mainlevee demandee',c:'bp'},expiree:{l:'Expiree',c:'bd'},liberee:{l:'Liberee',c:'bn'},en_attente:{l:'En attente',c:'bw'}};
var SMP={paye:{l:'Paye',c:'bs'},en_attente:{l:'En attente',c:'bw'},rejete:{l:'Rejete',c:'bd'},en_cours:{l:'En cours',c:'bi'}};
var SMAO={en_cours:{l:'En cours',c:'bi'},attribue:{l:'Attribue',c:'bs'},infructueux:{l:'Infructueux',c:'bw'},annule:{l:'Annule',c:'bd'}};
/* === Phase B : Full Cosmos API === */
var API_BASE='/api/data';
var CONTAINERS={aos:'mp_aos', marches:'mp_marches', cautions:'mp_cautions', paiements:'mp_paiements', indices:'mp_indices', bordereaux:'mp_bordereau', banques:'mp_banques'};

/* ES5 polyfills */
function objVals(o){return Object.keys(o).map(function(k){return o[k];});}
function objEnts(o){return Object.keys(o).map(function(k){return [k,o[k]];});}
function uniqueArr(a){var s={},r=[];a.forEach(function(v){if(!s[v]){s[v]=1;r.push(v);}});return r;}

var S={page:'dashboard',search:'',sf:'',tf:'',bf:'',aos:[],marches:[],cautions:[],paiements:[],indices:[],bordereaux:[],banques:[],_charts:{},_nfn:null,_sv:null,_tmpC:[],_osTemp:[],_loaded:false,_tmpPostes:[]};

/* === Generation d'IDs (timestamps + prefix) === */
function nidStr(prefix){return prefix+'_'+Date.now()+'_'+Math.floor(Math.random()*1000);}
function nid(){return nidStr('n');} /* compat pour _osTemp */

/* === Conversion marche_id <-> marcheId pour cautions/paiements/bordereaux === */
function toCosmos(ckey, item){
  var c=cp(item);
  if(ckey==='cautions' || ckey==='paiements' || ckey==='bordereaux'){
    if(c.marche_id!=null) c.marcheId=String(c.marche_id);
    delete c.marche_id;
  }
  if(c.id!=null) c.id=String(c.id);
  return c;
}
function fromCosmos(ckey, item){
  var c={};
  Object.keys(item).forEach(function(k){if(k[0]!=='_') c[k]=item[k];});
  if(ckey==='cautions' || ckey==='paiements' || ckey==='bordereaux'){
    if(c.marcheId!=null) c.marche_id=c.marcheId;
    delete c.marcheId;
  }
  return c;
}

/* === Appels API === */
function apiFetch(url, opts){
  opts=opts||{};
  return fetch(url, opts).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t);});
    if(r.status===204) return null;
    return r.json();
  });
}
function apiList(ckey){
  return apiFetch(API_BASE+'/'+CONTAINERS[ckey]).then(function(items){
    return items.map(function(it){return fromCosmos(ckey, it);});
  });
}
function apiUpsert(ckey, item){
  var cosmos=toCosmos(ckey, item);
  return apiFetch(API_BASE+'/'+CONTAINERS[ckey], {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(cosmos)
  }).then(function(r){return fromCosmos(ckey, r);});
}
function apiDelete(ckey, id, pkValue){
  var pk=pkValue!=null?String(pkValue):String(id);
  var url=API_BASE+'/'+CONTAINERS[ckey]+'/'+encodeURIComponent(id)+'?pk='+encodeURIComponent(pk);
  return apiFetch(url, {method:'DELETE'});
}

/* === Load initial === */
function apiLoadAll(){
  setStatus('Chargement...');
  return Promise.all([apiList('aos'), apiList('marches'), apiList('cautions'), apiList('paiements'), apiListIndices(), apiListSafe('bordereaux'), apiListSafe('banques')])
  .then(function(res){
    S.aos=res[0]; S.marches=res[1]; S.cautions=res[2]; S.paiements=res[3]; S.indices=res[4]; S.bordereaux=res[5]; S.banques=res[6];
    S._loaded=true;
    setStatus('Synchronise '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    sbStats();
  }).catch(function(e){
    console.error('apiLoadAll error:', e);
    setStatus('Erreur chargement');
    toast('Erreur chargement donnees: '+e.message);
    throw e;
  });
}

/* Chargement safe : si le container n'existe pas encore, retourner [] */
function apiListSafe(ckey){
  return apiList(ckey).catch(function(e){
    console.warn(ckey+' non charge (container peut-etre pas cree):', e.message);
    return [];
  });
}

/* Indices : container a PK /type, on filtre par type=monthly */
function apiListIndices(){
  return apiFetch(API_BASE+'/'+CONTAINERS.indices+'?type=monthly').then(function(items){
    return items.map(function(it){ return fromCosmos('indices', it); });
  }).catch(function(e){
    console.warn('Indices non charges (container peut-etre pas cree):', e.message);
    return [];
  });
}

/* === Mutations wrappers === */
function saveItem(ckey, item){
  return apiUpsert(ckey, item).then(function(saved){
    var arr=S[ckey];
    var idx=arr.findIndex(function(x){return String(x.id)===String(saved.id);});
    if(idx>=0) arr[idx]=saved; else arr.push(saved);
    setStatus('Sauvegarde '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    return saved;
  }).catch(function(e){
    console.error('saveItem error:', e);
    toast('Erreur sauvegarde: '+e.message);
    throw e;
  });
}
function deleteItem(ckey, id, pkValue){
  return apiDelete(ckey, id, pkValue).then(function(){
    S[ckey]=S[ckey].filter(function(x){return String(x.id)!==String(id);});
    setStatus('Supprime '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  }).catch(function(e){
    console.error('deleteItem error:', e);
    toast('Erreur suppression: '+e.message);
    throw e;
  });
}
function saveMany(ckey, items){
  return Promise.all(items.map(function(it){return apiUpsert(ckey, it);})).then(function(saved){
    saved.forEach(function(s){
      var idx=S[ckey].findIndex(function(x){return String(x.id)===String(s.id);});
      if(idx>=0) S[ckey][idx]=s; else S[ckey].push(s);
    });
    return saved;
  });
}

function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{var d=JSON.parse(ev.target.result);
      if(!d.marches)throw new Error('Format invalide');
      if(!confirm('Restaurer cette sauvegarde?'))return;
      var iA=d.aos||[], iM=d.marches||[], iC=d.cautions||[], iP=d.paiements||[];
      Promise.all([saveMany('aos',iA), saveMany('marches',iM), saveMany('cautions',iC), saveMany('paiements',iP)]).then(function(){sbStats();render();toast('Sauvegarde restauree (synchronisee Cosmos)');}).catch(function(e){toast('Erreur import: '+e.message);});
    }catch(err){toast('Fichier invalide',false);}
  };
  r.readAsText(file);e.target.value='';
}

// CALCULS DATE FIN + AUTO-STATUT
function calcDateFin(dc,delai,os){
  if(!dc||!delai)return null;
  var start=new Date(dc);var d=parseInt(delai)||0;
  var sorted=(os||[]).slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var suspended=0,arret=null;
  sorted.forEach(function(o){
    if(o.type==='arret')arret=new Date(o.date);
    else if(o.type==='reprise'&&arret){suspended+=Math.round((new Date(o.date)-arret)/86400000);arret=null;}
  });
  if(arret)suspended+=Math.round((Date.now()-arret)/86400000);
  var fin=new Date(start);fin.setDate(fin.getDate()+d+suspended);
  return fin.toISOString().slice(0,10);
}
function checkAutoTermine(mid){
  var m=S.marches.find(function(x){return x.id===mid;});
  if(!m||m.statut==='termine')return;
  var mc=S.cautions.filter(function(c){return c.marche_id===mid&&(c.type==='bonne_execution'||c.type==='retenue_garantie');});
  if(mc.length<1)return;
  if(mc.every(function(c){return c.statut==='liberee';})){
    m.statut='termine';m.avancement=100;
    saveItem('marches',m).then(function(){sbStats();render();toast('Marche '+m.ref+' passe automatiquement a Termine - toutes les cautions sont liberees');}).catch(function(e){toast('Erreur save auto-termine: '+e.message);});
  }
}

function suggestProvMnt(){

function newAO(){
  openMod("Nouvel appel d'offres",aoFormHTML(null),function(){
    var ref=v('aref'),objet=v('aobjet'),maitre_ouvrage=v('amo');
    if(!ref||!objet||!maitre_ouvrage){alert('Champs obligatoires manquants');return;}
    var cpNum=v('cp_num');
    var cp=cpNum?{banque:getBanqueValue('cp'),num:cpNum,montant:vn('cp_montant'),date_emission:v('cp_emission')||null,date_expiration:v('cp_expiration')||null,statut:v('cp_statut')||'active'}:null;
    if(cp && cp.banque) ensureBanqueExists(cp.banque);
    var newAo={id:nidStr('ao'),ref:ref,objet:objet,maitre_ouvrage:maitre_ouvrage,type:v('atype'),budget_estime:vn('abud'),date_lancement:v('adl')||null,date_limite:v('adlim')||null,statut:v('astat'),marche_id:null,caution_prov:cp,notes:v('anotes')};
    saveItem('aos',newAo).then(function(){sbStats();render();toast('AO cree');});
  });
}
function editAO(id){
  var a=S.aos.find(function(x){return x.id===id;});if(!a)return;
  var oldStatut=a.statut;
  openMod('Modifier AO - '+a.ref,aoFormHTML(a),function(){
    var cpNum=v('cp_num');
    var cpNew=cpNum?{banque:getBanqueValue('cp'),num:cpNum,montant:vn('cp_montant'),date_emission:v('cp_emission')||null,date_expiration:v('cp_expiration')||null,statut:v('cp_statut')||'active'}:a.caution_prov;
    if(cpNew && cpNew.banque) ensureBanqueExists(cpNew.banque);
    a.ref=v('aref');a.objet=v('aobjet');a.maitre_ouvrage=v('amo');a.type=v('atype');a.budget_estime=vn('abud');a.date_lancement=v('adl')||null;a.date_limite=v('adlim')||null;a.statut=v('astat');a.caution_prov=cpNew;a.notes=v('anotes');
    // Si AO devient infructueux/annule ET caution prov encore active, basculer en mainlevee_demandee
    var cautionAutoUpdated=false;
    if((a.statut==='infructueux'||a.statut==='annule') && oldStatut!==a.statut && a.caution_prov && a.caution_prov.statut==='active'){
      a.caution_prov.statut='mainlevee_demandee';
      a.caution_prov.date_demande_mainlevee=new Date().toISOString().slice(0,10);
      cautionAutoUpdated=true;
    }
    saveItem('aos',a).then(function(){sbStats();render();toast(cautionAutoUpdated?'AO mis a jour - caution prov. en attente de liberation':'AO mis a jour');});
  });
}
function attribuerAO(id){
  var a=S.aos.find(function(x){return x.id===id;});if(!a)return;
  if(!confirm("Attribuer l'AO '"+a.ref+"' et creer le marche?"))return;
  var yr=new Date().getFullYear();var newId=nidStr('m');
  S.marches.push({id:newId,ref:'MRC-'+yr+'-'+String(newId).padStart(3,'0'),titre:a.objet,maitre_ouvrage:a.maitre_ouvrage,objet:a.objet,montant:a.budget_estime||0,type:a.type,statut:'en_cours',date_attribution:new Date().toISOString().slice(0,10),date_commencement:null,delai_execution:null,date_fin_calculee:null,date_reception_provisoire:null,date_reception_definitive:null,avancement:0,garantie:5,ordres_service:[]});
  a.statut='attribue';a.marche_id=newId;
  // Caution provisoire : passe en "mainlevee demandee" (pas "liberee" direct)
  // La caution sera liberee effectivement quand la banque confirme
  if(a.caution_prov && a.caution_prov.statut==='active'){
    a.caution_prov.statut='mainlevee_demandee';
    a.caution_prov.date_demande_mainlevee=new Date().toISOString().slice(0,10);
  }
  var newMarche=S.marches[S.marches.length-1];Promise.all([saveItem('marches',newMarche), saveItem('aos',a)]).then(function(){sbStats();render();toast('Marche cree - caution prov. en attente de liberation effective');closeMod();}).catch(function(e){toast('Erreur creation marche');});
}

function collectOS(){
  return S._osTemp.map(function(o){
    return {id:o.id,type:o.type,date:document.getElementById('os_date_'+o.id)?document.getElementById('os_date_'+o.id).value||'':'',motif:document.getElementById('os_motif_'+o.id)?document.getElementById('os_motif_'+o.id).value||'':''};
  }).filter(function(o){return o.date;});
}
function updateDFC(){
  var dc=v('mdcom'),del=parseInt(v('mdelai'))||0;
  if(!dc||!del){var el=document.getElementById('mdfin_calc');if(el)el.value='';return;}
  var tmpOS=S._osTemp.map(function(o){return {type:o.type,date:document.getElementById('os_date_'+o.id)?document.getElementById('os_date_'+o.id).value||'':''};}).filter(function(o){return o.date;});
  var dfin=calcDateFin(dc,del,tmpOS);
  var el=document.getElementById('mdfin_calc');if(el)el.value=dfin?fdat(dfin):'';
  var sorted=tmpOS.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var susp=0,arr=null;
  sorted.forEach(function(o){if(o.type==='arret')arr=new Date(o.date);else if(o.type==='reprise'&&arr){susp+=Math.round((new Date(o.date)-arr)/86400000);arr=null;}});
  if(arr)susp+=Math.round((Date.now()-arr)/86400000);
  var inf=document.getElementById('os-info');
  if(inf){if(susp>0){inf.style.display='block';inf.textContent='Total jours d\'arret: '+susp+' jours - Date fin reportee d\'autant.';}else inf.style.display='none';}
}

function delMarche(id){
  var m=S.marches.find(function(x){return x.id===id;});if(!m)return;
  if(!confirm('Supprimer "'+m.ref+'"? Les cautions et paiements seront aussi supprimes.'))return;
  var cautionsToDelete=S.cautions.filter(function(x){return x.marche_id===id;});
  var paiementsToDelete=S.paiements.filter(function(x){return x.marche_id===id;});
  var delC=cautionsToDelete.map(function(c){return deleteItem('cautions',c.id,c.marche_id);});
  var delP=paiementsToDelete.map(function(p){return deleteItem('paiements',p.id,p.marche_id);});

  var c=S.cautions.find(function(x){return String(x.id)===String(id);});if(!c)return;
  var oldStatut=c.statut;
  openMod('Modifier caution - '+c.num,cautionFormHTML(c),function(){
    var banque=getBanqueValue('c'); ensureBanqueExists(banque);
    c.marche_id=v('cmar');c.type=v('ctype');c.banque=banque;c.num=v('cnum');c.montant=vn('cmnt')||c.montant;c.date_emission=v('cdem')||null;c.date_expiration=v('cdex')||null;c.statut=v('cstat');
    c.date_demande_mainlevee=v('cdemmain')||null;
    c.date_liberation_effective=v('cliber')||null;
    c.notes_mainlevee=v('cnotesmain')||'';
    saveItem('cautions',c).then(function(){sbStats();render();toast('Caution mise a jour');});
    if(c.statut==='liberee'&&oldStatut!=='liberee')checkAutoTermine(c.marche_id);
  });
}
/* Action principale du bouton L : adapte selon statut actuel de la caution */
function libereCaution(id){
  var c=S.cautions.find(function(x){return String(x.id)===String(id);});if(!c)return;
  if(c.statut==='active'){
    // Etape 1 : demander la mainlevee
    if(!confirm('Demander la mainlevee de cette caution ?\n\n(L\'argent est toujours bloque a la banque - tu confirmeras la liberation effective quand la banque le confirmera)'))return;
    c.statut='mainlevee_demandee';
    c.date_demande_mainlevee=new Date().toISOString().slice(0,10);
    saveItem('cautions',c).then(function(){sbStats();render();toast('Mainlevee demandee le '+fdat(c.date_demande_mainlevee));});
  } else if(c.statut==='mainlevee_demandee'){
    // Etape 2 : confirmer la liberation effective par la banque
    if(!confirm('Confirmer la liberation effective de cette caution ?\n\n(La banque a confirme le deblocage de l\'argent)'))return;
    c.statut='liberee';
    c.date_liberation_effective=new Date().toISOString().slice(0,10);
    saveItem('cautions',c).then(function(){sbStats();render();checkAutoTermine(c.marche_id);toast('Caution liberee effectivement');});
  } else {
    toast('Action non disponible - caution deja liberee ou expiree');
  }
}
/* Raccourci : liberation directe (saut l'etape "demandee") pour les cas rapides */
function libereCautionDirect(id){
  var c=S.cautions.find(function(x){return String(x.id)===String(id);});if(!c)return;
  if(!confirm('Liberer directement cette caution ?\n\n(Pour les cas ou la mainlevee est recue immediatement - passe direct de "active" a "liberee")'))return;
  c.statut='liberee';
  if(!c.date_demande_mainlevee) c.date_demande_mainlevee=new Date().toISOString().slice(0,10);
  c.date_liberation_effective=new Date().toISOString().slice(0,10);
  saveItem('cautions',c).then(function(){sbStats();render();checkAutoTermine(c.marche_id);toast('Caution liberee');});
}
function delCaution(id){
  if(!confirm('Supprimer cette caution?'))return;
  var cdel=S.cautions.find(function(c){return c.id===id;});if(!cdel){toast('Caution introuvable');return;}
  var affectedP=S.paiements.filter(function(p){return p.caution_rg_id===id;});
  affectedP.forEach(function(p){p.caution_rg_id=null;});
  deleteItem('cautions',id,cdel.marche_id).then(function(){
    return Promise.all(affectedP.map(function(p){return saveItem('paiements',p);}));
  }).then(function(){sbStats();render();toast('Caution supprimee');}).catch(function(e){toast('Erreur: '+e.message);});
}

function setMode(mode){
  document.querySelectorAll('.mode-btn').forEach(function(b,i){b.classList.toggle('on',['deduction','caution','aucune'][i]===mode);});

  document.getElementById('p-caut').style.display=mode==='caution'?'block':'none';
  document.getElementById('p-aucun').style.display=mode==='aucune'?'block':'none';

}
function getMode(){var btns=document.querySelectorAll('.mode-btn');var modes=['deduction','caution','aucune'];for(var i=0;i<btns.length;i++){if(btns[i].classList.contains('on'))return modes[i];}return'deduction';}

function loadUser(){
  return fetch('/.auth/me').then(function(r){return r.json();}).then(function(data){
    var cp=data&&data.clientPrincipal;
    if(!cp){return;}
    var name=cp.userDetails||'Utilisateur';

    var displayName=name, mail=name;
    claims.forEach(function(c){
      if(c.typ==='name'||c.typ==='http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name') displayName=c.val;
      if(c.typ==='preferred_username'||c.typ==='email'||c.typ==='http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress') mail=c.val;
    });
    var el=document.getElementById('sbu');

    var elM=document.getElementById('sbu-mail');
    if(el&&elN&&elM){elN.textContent=displayName;elM.textContent=mail;el.style.display='block';}
  }).catch(function(e){console.error('loadUser:',e);});
}

/* Utilitaires */
function fmtIdx(val){return val==null||isNaN(val)?'-':Number(val).toFixed(2);}
function getRecentPeriods(n){
  n=n||24;
  var out=[], d=new Date();
  d.setDate(1);
  for(var i=0;i<n;i++){
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0');
    out.push(y+'-'+m);
    d.setMonth(d.getMonth()-1);
  }
  return out;
}
function getIndicesForPeriod(periode){
  return S.indices.find(function(x){return x.periode===periode;})||null;
}
function getIndexValue(periode, code){
  var row=getIndicesForPeriod(periode);
  if(!row||!row.values) return null;
  return row.values[code]!=null ? Number(row.values[code]) : null;
}

/* Modal saisie indice */
function modalSaisieIndice(periode){
  var isNew=!periode;
  if(isNew){
    periode=getRecentPeriods(1)[0];
  }
  var row=getIndicesForPeriod(periode)||{id:null, type:'monthly', periode:periode, values:{}, definitif:false, date_publication:''};

  var h='';
  h+='<div class="fg"><label>Periode (YYYY-MM) *</label><input class="fc" id="idx_p" value="'+periode+'" '+(row.id?'readonly':'')+' placeholder="ex 2026-03"></div>';
  h+='<div class="fg"><label>Date de publication HCP</label><input class="fc" type="date" id="idx_pub" value="'+(row.date_publication||'')+'"></div>';

  h+='<div class="sec"><div class="sec-t">Valeurs des indices</div>';
  INDICES_TYPES.forEach(function(i){
    var val=row.values[i.code]!=null?row.values[i.code]:'';
    h+='<div class="fg"><label>'+i.label+'</label><input class="fc" type="number" step="0.01" id="idx_v_'+i.code+'" value="'+val+'" placeholder="ex: 115.24"></div>';
  });
  h+='</div>';

  h+='<div class="fg"><label>Statut</label><select class="fc" id="idx_def"><option value="0"'+(row.definitif?'':' selected')+'>Provisoire</option><option value="1"'+(row.definitif?' selected':'')+'>Definitif</option></select></div>';

  openMod((row.id?'Modifier':'Saisir')+' indices '+periode, h, function(){
    var p=v('idx_p');
    if(!p||!/^\d{4}-\d{2}$/.test(p)){alert('Periode invalide (format YYYY-MM attendu)');return;}

    var newRow={
      id:row.id||('ind_'+p.replace('-','_')),
      type:'monthly',
      periode:p,
      date_publication:v('idx_pub')||null,
      definitif:v('idx_def')==='1',
      values:{}
    };
    var hasValue=false;
    INDICES_TYPES.forEach(function(i){
      var val=vn('idx_v_'+i.code);
      if(val!=null){newRow.values[i.code]=val;hasValue=true;}
    });
    if(!hasValue){alert('Saisir au moins une valeur d\'indice');return;}

    saveItem('indices',newRow).then(function(){
      sbStats();
      render();
      toast(row.id?'Indices mis a jour':'Indices saisis pour '+p);
    }).catch(function(e){
      alert('Erreur sauvegarde: '+e.message);
    });
  });
}

/* Importer un fichier Excel/CSV */
function handleIndicesImport(input){
  var file=input.files&&input.files[0];
  if(!file)return;

  if(typeof XLSX==='undefined'){
    alert('Librairie XLSX non disponible - recharger la page');
    input.value='';
    return;
  }

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});

      // On cherche d'abord une feuille "Indices" puis on prend la 1ere
      var sheetName=wb.SheetNames.indexOf('Indices')>=0 ? 'Indices' : wb.SheetNames[0];
      var sheet=wb.Sheets[sheetName];
      var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null,blankrows:false});

      processImportedRows(rows);
    } catch(err){
      console.error('Import error:', err);
      alert('Erreur lecture fichier : '+err.message);
    }
    input.value=''; // reset pour pouvoir reimporter meme fichier
  };
  reader.onerror=function(){
    alert('Erreur lecture du fichier');
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

/* Parser les lignes, valider, creer la liste a importer */
function processImportedRows(rows){
  if(!rows||rows.length===0){
    alert('Fichier vide');
    return;
  }

  // Trouver la ligne d'en-tete (chercher celle qui contient "periode")
  var headerRowIdx=-1;
  for(var i=0;i<Math.min(rows.length,10);i++){
    var r=rows[i]||[];
    for(var j=0;j<r.length;j++){
      if(r[j] && String(r[j]).trim().toLowerCase()==='periode'){
        headerRowIdx=i;
        break;
      }
    }
    if(headerRowIdx>=0)break;
  }

  if(headerRowIdx<0){
    alert('En-tete "periode" introuvable.\nVerifier que le fichier a les colonnes : periode, BAT3, BAT6, date_publication, statut');
    return;
  }

  var headers=rows[headerRowIdx].map(function(h){return h?String(h).trim().toLowerCase():'';});
  var idxPeriode=headers.indexOf('periode');
  var idxBat3=headers.indexOf('bat3');
  var idxBat6=headers.indexOf('bat6');
  var idxDate=headers.indexOf('date_publication');
  var idxStatut=headers.indexOf('statut');

  if(idxPeriode<0){
    alert('Colonne "periode" introuvable');
    return;
  }
  if(idxBat3<0 && idxBat6<0){
    alert('Au moins une colonne BAT3 ou BAT6 est requise');
    return;
  }

  // Parser les lignes de donnees (apres l'en-tete + eventuelle ligne description)
  var toImport=[];
  var errors=[];
  for(var k=headerRowIdx+1;k<rows.length;k++){
    var row=rows[k];
    if(!row || !row[idxPeriode])continue; // skip lignes vides

    var periode=String(row[idxPeriode]).trim();

    // Skip ligne description
    if(periode.toLowerCase()==='yyyy-mm' || periode.toLowerCase().indexOf('format')>=0){
      continue;
    }

    // Validation format periode
    if(!/^\d{4}-\d{2}$/.test(periode)){
      errors.push('Ligne '+(k+1)+' : periode invalide "'+periode+'" (format YYYY-MM attendu)');
      continue;
    }

    var bat3=idxBat3>=0 ? toNumberOrNull(row[idxBat3]) : null;
    var bat6=idxBat6>=0 ? toNumberOrNull(row[idxBat6]) : null;

    if(bat3==null && bat6==null){
      // Ignorer les lignes sans aucune valeur (pre-remplies)
      continue;
    }

    var values={};
    if(bat3!=null) values.BAT3=bat3;
    if(bat6!=null) values.BAT6=bat6;

    var datePub=null;
    if(idxDate>=0 && row[idxDate]){
      datePub=parseDateFromCell(row[idxDate]);
    }

    var statut='provisoire';
    if(idxStatut>=0 && row[idxStatut]){
      var s=String(row[idxStatut]).trim().toLowerCase();
      if(s==='definitif' || s==='définitif') statut='definitif';
    }

    toImport.push({
      id: 'ind_'+periode.replace('-','_'),
      type:'monthly',
      periode:periode,
      values:values,
      date_publication:datePub,
      definitif:statut==='definitif'
    });
  }

  if(toImport.length===0){
    var msg='Aucune ligne valide a importer.';
    if(errors.length>0) msg+='\n\nErreurs :\n'+errors.slice(0,5).join('\n');
    alert(msg);
    return;
  }

  // Confirmation
  var existantes=0;
  toImport.forEach(function(r){
    if(S.indices.find(function(x){return x.periode===r.periode;})) existantes++;
  });
  var nouvelles=toImport.length-existantes;

  var confirmMsg=toImport.length+' ligne(s) a importer :\n';
  confirmMsg+='- '+nouvelles+' nouvelle(s)\n';
  confirmMsg+='- '+existantes+' existante(s) (seront mises a jour)';
  if(errors.length>0){
    confirmMsg+='\n\n'+errors.length+' erreur(s) ignoree(s) :\n'+errors.slice(0,3).join('\n');
    if(errors.length>3) confirmMsg+='\n...';
  }
  confirmMsg+='\n\nContinuer ?';

  if(!confirm(confirmMsg))return;

  doImportIndices(toImport);
}

/* Helpers */
function toNumberOrNull(v){
  if(v==null || v==='')return null;
  if(typeof v==='number')return v;
  var s=String(v).trim().replace(',','.').replace(/\s/g,'');
  var n=Number(s);
  return isNaN(n) ? null : n;
}

function parseDateFromCell(v){
  if(!v)return null;
  if(v instanceof Date)return v.toISOString().slice(0,10);
  var s=String(v).trim();
  // Format YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // Format DD/MM/YYYY
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){
    var p=s.split('/');
    return p[2]+'-'+p[1]+'-'+p[0];
  }
  // Autre - tenter Date()
  try{
    var d=new Date(s);
    if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);
  }catch(e){}
  return null;
}

/* Executer l'import (sauvegarde sequentielle pour suivre la progression) */
function doImportIndices(list){
  setStatus('Import en cours...');
  toast('Import de '+list.length+' mois en cours...');

  var done=0, errors=0;

  function next(i){
    if(i>=list.length){
      setStatus('Import termine');
      toast('Import termine : '+done+' OK, '+errors+' erreur(s)');
      render();
      return;
    }
    saveItem('indices', list[i]).then(function(){
      done++;
      setStatus('Import '+done+'/'+list.length);
      next(i+1);
    }).catch(function(e){
      console.error('Erreur import '+list[i].periode+':', e);
      errors++;
      next(i+1);
    });
  }
  next(0);
}

function processBordereauRows(rows){
  if(!rows||rows.length===0){alert('Fichier vide');return;}

  // Normalisation : enleve accents, espaces multiples, caracteres speciaux
  function normalizeHeader(s){
    if(!s) return '';
    return String(s).toLowerCase()
      .replace(/[°\.\,\:\;\(\)\[\]\/\\\-_]/g,' ')  // remplace caracteres speciaux par espace
      .replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ûü]/g,'u')
      .replace(/\s+/g,' ').trim();
  }

  // Trouver la ligne d'en-tete : chercher une ligne qui contient au moins 3 mots-cles typiques
  var headerIdx=-1;
  var HEADER_KEYWORDS = ['poste','prestation','designation','unite','quantite','prix','total'];
  for(var i=0;i<Math.min(rows.length,15);i++){
    var r=(rows[i]||[]).map(normalizeHeader);
    var matches=0;
    for(var j=0;j<r.length;j++){
      for(var k=0;k<HEADER_KEYWORDS.length;k++){
        if(r[j].indexOf(HEADER_KEYWORDS[k])>=0){ matches++; break; }
      }
    }
    if(matches>=3){ headerIdx=i; break; }
  }
  if(headerIdx<0){
    alert('En-tete introuvable.\nColonnes attendues : N Poste (ou N° P), Designation (ou Prestation), Unite, Quantite, PU (ou Prix unitaire)');
    return;
  }

  var headers=rows[headerIdx].map(normalizeHeader);

  // findCol itere KEYWORDS D'ABORD puis colonnes : le keyword le plus specifique
  // est teste contre toutes les colonnes avant de passer au suivant plus generique
  // Cela evite que "prix" matche "n des prix" avant que "prix unitaire" matche la bonne colonne
  function findCol(keywords){
    for(var k=0;k<keywords.length;k++){
      for(var j=0;j<headers.length;j++){
        var h=headers[j];
        if(h===keywords[k] || h.indexOf(keywords[k])>=0) return j;
      }
    }
    return -1;
  }

  function findColExcept(keywords, excludedCols){
    for(var k=0;k<keywords.length;k++){
      for(var j=0;j<headers.length;j++){
        if(excludedCols.indexOf(j)>=0) continue;
        var h=headers[j];
        if(h===keywords[k] || h.indexOf(keywords[k])>=0) return j;
      }
    }
    return -1;
  }

  // Ordre : du plus specifique au plus generique
  var iNum = findCol(['n des prix', 'n prix', 'n poste', 'n p', 'no poste', 'numero poste', 'numero', 'num poste', 'poste', 'prix n', 'num']);
  var iDes = findCol(['designation de la prestation', 'designation prestation', 'designation', 'prestation', 'libelle', 'description']);
  var iUni = findCol(['unite', 'un']);
  var iQte = findCol(['quantite', 'qte', 'qty', 'qtt']);
  // Pour PU : d'abord patterns specifiques, puis "prix" en dernier recours
  // On EXCLUT les colonnes deja utilisees pour Num pour eviter la confusion avec "n des prix"
  var iPU  = findColExcept(['prix unitaire en dh', 'prix unitaire hors', 'prix unitaire h t', 'prix unitaire ht', 'prix unitaire', 'pu h t', 'pu ht', 'pu', 'prix'], [iNum]);

  if(iNum<0 || iDes<0 || iQte<0 || iPU<0){
    var missing=[];
    if(iNum<0)missing.push('N Poste');
    if(iDes<0)missing.push('Designation');
    if(iQte<0)missing.push('Quantite');
    if(iPU<0)missing.push('PU');
    alert('Colonnes manquantes : '+missing.join(', ')+'\n\nEn-tete detecte (ligne '+(headerIdx+1)+') :\n'+headers.filter(function(h){return h;}).join(' | '));
    return;
  }

  var postes=[]; var errors=[]; var ignoredTotals=0;
  for(var k=headerIdx+1;k<rows.length;k++){
    var row=rows[k];
    if(!row || row.every(function(c){return c===null || c===undefined || c==='';})) continue;

    var numRaw = row[iNum]!=null ? String(row[iNum]).trim() : '';
    var des    = row[iDes]!=null ? String(row[iDes]).trim() : '';

    // Ignorer les lignes TOTAL / TVA / TTC / mentions legales silencieusement
    var numLow = (numRaw+' '+des).toLowerCase();
    if(numLow.indexOf('total')>=0 || numLow.indexOf('tva')>=0 || numLow.indexOf('t.t.c')>=0 || numLow.indexOf('ttc')>=0 || numLow.indexOf('h.t')>=0 || numLow.indexOf('sous total')>=0 || numLow.indexOf('arrete')>=0 || numLow.indexOf('arrêté')>=0 || numLow.indexOf('fait a')>=0 || numLow.indexOf('signature')>=0 || numLow.indexOf('cachet')>=0 || numLow.indexOf('concurrent')>=0 || numLow.indexOf('somme toute')>=0){
      ignoredTotals++;
      continue;
    }

    var qte = parseFloat(String(row[iQte]).replace(',','.'))||0;
    var pu  = parseFloat(String(row[iPU]).replace(',','.'))||0;

    if(!numRaw && !des) continue;
    if(!numRaw){ errors.push('Ligne '+(k+1)+' : N Poste manquant'); continue; }
    if(qte<=0){ errors.push('Ligne '+(k+1)+' : Quantite invalide ('+row[iQte]+')'); continue; }
    if(pu<=0){ errors.push('Ligne '+(k+1)+' : PU invalide ('+row[iPU]+')'); continue; }

    postes.push({
      num: numRaw,
      designation: des,
      unite: iUni>=0 && row[iUni]!=null ? String(row[iUni]).trim() : '',
      quantite: qte,
      pu_initial: pu
    });
  }

  if(!postes.length){
    alert('Aucun poste valide\n'+(errors.length?errors.slice(0,5).join('\n'):''));
    return;
  }

  var msg = postes.length+' poste(s) a importer';
  if(ignoredTotals>0) msg += '\n'+ignoredTotals+' ligne(s) TOTAL/TVA/TTC ignoree(s)';
  if(errors.length) msg += '\n'+errors.length+' erreur(s) ignoree(s) :\n- '+errors.slice(0,3).join('\n- ');
  if(S._tmpPostes.length) msg += '\n\nRemplacer les '+S._tmpPostes.length+' postes existants ?';
  if(!confirm(msg)) return;

  S._tmpPostes = postes;
  var m = _editingMarcheId ? S.marches.find(function(x){return x.id===_editingMarcheId;}) : null;
  refreshPostesList(m);
  toast('Import termine : '+postes.length+' postes');
}

/* ========================================================================

   ======================================================================== */

var _lastSyncAt = null; // Date de derniere synchro reussie
var POLLING_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes

function updateSyncIndicator(){
  var el = document.getElementById('sync-indicator');
  if(!el) return;
  if(!_lastSyncAt){ el.textContent='Chargement...'; el.className=''; return; }
  var ageMs = Date.now() - _lastSyncAt.getTime();
  var ageMin = Math.floor(ageMs / 60000);
  var hhmm = _lastSyncAt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(ageMin < 1){
    el.textContent = 'Synchro '+hhmm;
  } else if(ageMin < 60){
    el.textContent = 'Synchro '+hhmm+' ('+ageMin+'min)';
  } else {
    el.textContent = 'Synchro '+hhmm+' (!)';
  }
  el.className = ageMin >= 10 ? 'stale' : '';
}

function manualRefresh(){
  var btn = document.getElementById('btn-refresh');
  if(btn) btn.classList.add('syncing');
  apiLoadAll().then(function(){
    _lastSyncAt = new Date();
    updateSyncIndicator();
    render();
    if(btn) btn.classList.remove('syncing');
    toast('Donnees rafraichies');
  }).catch(function(e){
    if(btn) btn.classList.remove('syncing');
    toast('Erreur refresh: '+e.message);
  });
}

function isModalOpen(){
  var mod = document.getElementById('mod');
  return mod && (mod.classList.contains('show') || mod.style.display==='flex');
}

function pollingRefresh(){
  // Skip si modal ouverte (l'utilisateur est en train d'editer)
  if(isModalOpen()) return;
  // Skip si onglet en arriere-plan
  if(document.hidden) return;
  // Skip si pas encore charge initialement
  if(!S._loaded) return;
  // Skip si l'utilisateur est en train de taper dans un input/textarea
  var ae = document.activeElement;
  if(ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT')) return;

  apiLoadAll().then(function(){
    _lastSyncAt = new Date();
    updateSyncIndicator();
    render();
  }).catch(function(e){
    console.warn('Polling refresh failed:', e.message);
  });
}

// Mise a jour indicateur toutes les 30s (affichage uniquement, pas de fetch)
setInterval(updateSyncIndicator, 30000);

// Polling reel toutes les 5 min
setInterval(pollingRefresh, POLLING_INTERVAL_MS);

// Hook apiLoadAll pour memoriser la date
var _origApiLoadAll = apiLoadAll;
apiLoadAll = function(){
  return _origApiLoadAll().then(function(res){
    _lastSyncAt = new Date();
    updateSyncIndicator();
    return res;
  });
};

  var bord = getBordereauForMarche(m.id);

  // Pas de bordereau ou pas de BAT0 -> pas de calcul K
  if(!bord || bat0==null){
    wrap.innerHTML = '<div class="sec" style="padding:10px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:4px;font-size:12px;color:#78350f">'+

  }

  // Bordereau dispo : afficher la section revision

  var periodeSaved = pCurrent ? pCurrent.periode_realisation : '';
  var mntInitialSaved = pCurrent ? pCurrent.montant_brut_initial : '';
  // Case decochee par defaut : coche uniquement si decompte existant avec K
  var activateChecked = pCurrent && pCurrent.K_applique ? 'checked' : '';

  wrap.innerHTML =
    '<div class="sec" style="padding:12px;background:#E6EEE9;border:1px solid #B8CFC0;border-radius:4px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<div style="font-size:13px;font-weight:600;color:#1F3A2E">Revision de prix</div>'+
        '<label style="font-size:11px;color:#4A453F;display:flex;align-items:center;gap:6px;cursor:pointer">'+
          '<input type="checkbox" id="p-rev-activate" '+activateChecked+' onchange="toggleRevisionInputs()"> Appliquer la revision de prix'+
        '</label>'+
      '</div>'+
      '<div style="font-size:11px;color:#7A7369;margin-bottom:8px">'+
        'Formule : P = P<sub>0</sub> &times; (a + b &times; BAT/BAT<sub>0</sub>) | '+
        'Indice : <b>'+bord.type_indice+'</b> | '+
        'BAT<sub>0</sub> = <b>'+bat0+'</b> ('+(bord.date_reference_BAT0||'reference du marche')+') | '+
        'a = '+bord.coefficient_a+', b = '+bord.coefficient_b+
      '</div>'+
      '<div id="p-rev-inputs">'+
        '<div class="fr2">'+
          '<div class="fg"><label style="font-size:11px">Periode de realisation *</label><input class="fc" id="p-rev-periode" type="month" value="'+(periodeSaved||'')+'" oninput="recomputeK()"></div>'+
          '<div class="fg"><label style="font-size:11px">Montant initial P<sub>0</sub> (MAD) *</label><input class="fc" id="p-rev-mnt-initial" type="number" value="'+(mntInitialSaved||'')+'" placeholder="Saisir le montant avant revision" oninput="recomputeK()"></div>'+
        '</div>'+
        '<div id="p-rev-result" style="margin-top:6px;font-size:12px;color:#4A453F"></div>'+
      '</div>'+
    '</div>';

  _revCtx.bordereau = bord;
  _revCtx.BAT0 = bat0;
  // Trigger recompute si des valeurs pre-remplies
  setTimeout(recomputeK, 0);
  // Etat initial de la checkbox
  setTimeout(toggleRevisionInputs, 0);
}

/* Active/desactive la section revision selon la checkbox */
function toggleRevisionInputs(){
  var cb = document.getElementById('p-rev-activate');
  var inputs = document.getElementById('p-rev-inputs');
  var pmnt = document.getElementById('pmnt');
  if(!cb || !inputs) return;
  if(cb.checked){
    inputs.style.display='block';
    if(pmnt){
      pmnt.readOnly=true;
      pmnt.style.background='#EDE8DE';
      pmnt.title='Calcule automatiquement depuis P0 x K';
    }
    recomputeK();
  } else {
    inputs.style.display='none';
    if(pmnt){
      pmnt.readOnly=false;
      pmnt.style.background='';
      pmnt.title='';
    }
    _revCtx.K=null;_revCtx.BAT=null;_revCtx.periode=null;
  }
}

/* Recalcule K et met a jour le montant brut du decompte */
function recomputeK(){
  var cb = document.getElementById('p-rev-activate');
  if(!cb || !cb.checked) return;
  var bord = _revCtx.bordereau;
  if(!bord || _revCtx.BAT0==null){ return; }

  var periode = v('p-rev-periode');
  var mntInitial = vn('p-rev-mnt-initial');
  var resultEl = document.getElementById('p-rev-result');
  var pmnt = document.getElementById('pmnt');

  if(!periode){
    if(resultEl) resultEl.innerHTML = '<span style="color:#7A7369">&larr; Saisir la periode de realisation</span>';
    _revCtx.K=null;_revCtx.BAT=null;_revCtx.periode=null;
    return;
  }

  var indice = getIndiceForPeriode(periode);
  var BAT = indice ? (indice[bord.type_indice]) : null;

  if(BAT==null){
    if(resultEl) resultEl.innerHTML = '<span style="color:#c2410c">&#9888; Indice '+bord.type_indice+' introuvable pour '+periode+' (aller sur page Indices HCP pour l\'ajouter)</span>';
    _revCtx.K=null;_revCtx.BAT=null;_revCtx.periode=periode;
    if(pmnt) pmnt.value='';
    return;
  }

  var a = bord.coefficient_a || 0.15;
  var b = bord.coefficient_b || 0.85;
  var K = a + b * (BAT / _revCtx.BAT0);
  var mntRevise = mntInitial ? Math.round(mntInitial * K * 100) / 100 : 0;

  _revCtx.K = K;
  _revCtx.BAT = BAT;
  _revCtx.periode = periode;

  var variation = ((K - 1) * 100).toFixed(2);
  var variationSign = K >= 1 ? '+' : '';
  var variationColor = K >= 1 ? '#065f46' : '#8B2A1C';

  if(resultEl){
    resultEl.innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div>'+
          '<div style="font-size:11px;color:#7A7369">BAT periode ('+periode+')</div>'+
          '<div style="font-family:var(--FM);font-size:14px;font-weight:600">'+BAT+'</div>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:11px;color:#7A7369">Coefficient K</div>'+
          '<div style="font-family:var(--FM);font-size:14px;font-weight:600;color:'+variationColor+'">'+K.toFixed(4)+' ('+variationSign+variation+'%)</div>'+
        '</div>'+
      '</div>'+
      (mntInitial ? '<div style="margin-top:6px;padding:6px 8px;background:#F5EAE6;border-radius:3px;font-size:12px">'+
        'Montant revise = '+fmad(mntInitial)+' &times; '+K.toFixed(4)+' = <b>'+fmad(mntRevise)+'</b>'+
      '</div>' : '');
  }

  // Mettre a jour le champ pmnt (montant brut du decompte)
  if(pmnt) pmnt.value = mntRevise;
  calcNet();
}

/* Retourne toutes les cautions en statut mainlevee_demandee */
function getCautionsEnAttenteMainlevee(){
  return (S.cautions||[]).filter(function(c){return c.statut==='mainlevee_demandee';});
}

/* Jours ecoules depuis la demande de mainlevee */
function joursMainlevee(c){
  if(!c.date_demande_mainlevee) return 0;
  return Math.floor((Date.now() - new Date(c.date_demande_mainlevee).getTime()) / 86400000);
}

/* Code couleur selon seuils : 15j vert, 30j jaune, 45j rouge */
function colorMainlevee(jours){
  if(jours<15) return {color:'#065f46', bg:'#E4F0E8', emoji:'🟢', label:'A jour'};
  if(jours<30) return {color:'#c2410c', bg:'#FEF3C7', emoji:'🟡', label:'A surveiller'};
  if(jours<45) return {color:'#8B2A1C', bg:'#F5E6E3', emoji:'🟠', label:'A relancer'};
  return {color:'#8B2A1C', bg:'#F5E6E3', emoji:'🔴', label:'Urgent'};
}

  list.sort(function(a,b){return joursMainlevee(b) - joursMainlevee(a);});

    var jours = joursMainlevee(c);

        '<span>'+c.banque+'</span> &middot; '+
